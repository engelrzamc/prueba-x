<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Hacienda - Portal del Contribuyente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fondo tecnológico azul institucional */
            background: linear-gradient(rgba(10, 30, 65, 0.85), rgba(10, 30, 65, 0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-1.2.1&auto=format&fit=crop&w=1352&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Barra de navegación */
        header {
            width: 100%;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Botón Administrativo arriba a la derecha */
        .admin-access {
            background-color: #e74c3c;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .admin-access:hover {
            background-color: transparent;
            border-color: #e74c3c;
            color: #e74c3c;
        }

        /* Contenedor Central */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-msg {
            color: white;
            margin-bottom: 30px;
        }

        .welcome-msg h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Tarjeta de Inicio de Sesión */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            color: #1a2a6c;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1a2a6c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #b21f1f;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #1a2a6c;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hacienda Digital</div>
        <a href="#" class="admin-access" onclick="alert('Redirigiendo al panel de control interno...')">ACCESO ADMINISTRATIVO</a>
    </header>

    <div class="main-content">
        <div class="welcome-msg">
            <h1>Bienvenido, Contribuyente</h1>
            <p>Acceda a su estado de cuenta y trámites en línea.</p>
        </div>

        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <form id="haciendaForm">
                <div class="form-group">
                    <label for="user">Usuario / RFC</label>
                    <input type="text" id="user" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" placeholder="admin" required>
                </div>
                <button type="submit" class="btn-login">INGRESAR AL PORTAL</button>
            </form>
            
            <div class="footer-links">
                <p><a href="#">¿No tiene cuenta? Regístrese aquí</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('haciendaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u === "admin" && p === "admin") {
                alert("¡Bienvenido al Sistema de Hacienda! Acceso exitoso.");
                // Aquí podrías poner: window.location.href = "dashboard_contribuyente.html";
            } else {
                alert("Error: Usuario o contraseña incorrectos para el portal.");
            }
        });
    </script>

</body>
</html>
