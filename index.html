<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Hacienda - Portal del Contribuyente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* ID para identificar el fondo y cambiarlo con JS */
            background: linear-gradient(rgba(10, 30, 65, 0.85), rgba(10, 30, 65, 0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-1.2.1&auto=format&fit=crop&w=1352&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        header {
            width: 100%;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .logo {
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .admin-access {
            background-color: #e74c3c;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-msg {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1a2a6c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- PANEL DE SUPER ADMIN (OCULTO POR DEFECTO) --- */
        #superAdminPanel {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 100;
            width: 300px;
        }

        #superAdminPanel h3 { margin-bottom: 10px; color: #333; font-size: 0.9rem; }
        .panel-input { width: 100%; margin-bottom: 10px; padding: 5px; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 5px 10px; cursor: pointer; width: 100%; }

    </style>
</head>
<body>

    <header>
        <div class="logo" id="mainLogo">Hacienda Digital</div>
        <a href="#" class="admin-access">ACCESO ADMINISTRATIVO</a>
    </header>

    <div class="main-content">
        <div class="welcome-msg">
            <h1 id="welcomeTitle">Bienvenido, Contribuyente</h1>
            <p>Acceda a su estado de cuenta y trámites en línea.</p>
        </div>

        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <form id="haciendaForm">
                <div class="form-group">
                    <label>Usuario / RFC</label>
                    <input type="text" id="user" placeholder="admin o superadmin" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="pass" placeholder="admin o 1234" required>
                </div>
                <button type="submit" class="btn-login">INGRESAR AL PORTAL</button>
            </form>
        </div>
    </div>

    <div id="superAdminPanel">
        <h3>🛠 Panel Super Admin</h3>
        <label>Texto del Logo:</label>
        <input type="text" id="editLogo" class="panel-input" placeholder="Nuevo nombre...">
        
        <label>Imagen de Fondo (URL):</label>
        <input type="text" id="editBg" class="panel-input" placeholder="https://imagen.jpg...">
        
        <button class="btn-save" onclick="aplicarCambios()">Aplicar Cambios</button>
        <p style="font-size: 10px; margin-top: 5px; color: gray;">*Los cambios son visuales para esta sesión.</p>
    </div>

    <script>
        document.getElementById('haciendaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u === "superadmin" && p === "1234") {
                alert("¡Modo Super Admin activado! Panel de edición disponible abajo a la izquierda.");
                document.getElementById('superAdminPanel').style.display = 'block';
            } 
            else if(u === "admin" && p === "admin") {
                alert("¡Bienvenido al Sistema de Hacienda! Acceso exitoso.");
            } 
            else {
                alert("Error: Credenciales incorrectas.");
            }
        });

        function aplicarCambios() {
            const nuevoLogo = document.getElementById('editLogo').value;
            const nuevaImg = document.getElementById('editBg').value;

            if(nuevoLogo) {
                document.getElementById('mainLogo').innerText = nuevoLogo;
                document.getElementById('welcomeTitle').innerText = "Portal de " + nuevoLogo;
            }

            if(nuevaImg) {
                document.body.style.background = `linear-gradient(rgba(10, 30, 65, 0.85), rgba(10, 30, 65, 0.85)), url('${nuevaImg}')`;
                document.body.style.backgroundSize = "cover";
            }
        }
    </script>

</body>
</html>
